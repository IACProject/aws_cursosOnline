apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      httpMethod: POST
      tlsSkipVerify: true
      timeInterval: "15s"
      keepCookies:
        - grafana_session
        - grafana_user

    secureJsonData:
      tlsCACert: ""
      tlsClientCert: ""
      tlsClientKey: ""